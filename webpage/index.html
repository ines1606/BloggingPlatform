<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Blog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>My Personal Blog</h1>
  </header>
  <main>
    <section id="articles-section">
      <h2>Articles</h2>
      <h3>Search Articles</h3>
      <form id="article-form">
        <label for="searchTitle">Title:</label>
        <input type="text" id="searchTitle" name="title">
        <label for="searchTags">Tags (comma-separated):</label>
        <input type="text" id="searchTags" name="tags">
        <label for="publishDate">Date published:</label>
        <input type="date" id="publishDate" name="Datepublished">
      </form>
      <div id="articles-container">
        <!-- Articles will be displayed here -->
      </div>
    </section>
    <section id="new-article-section">
      <h2>Create a New Article</h2>
      <form id="article-form">
        <label for="title">Title:</label>
        <input type="text" id="title" name="title" required>
        <label for="content">Content:</label>
        <textarea id="content" name="content" required></textarea>
        <label for="tags">Tags (comma-separated):</label>
        <input type="text" id="tags" name="tags">
        <button type="submit">Publish</button>
      </form>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
